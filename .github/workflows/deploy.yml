name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  deploy_test:
    name: Deploy to test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: test
      url: https://test.jpwebcreation.nl/

    permissions:
      contents: read

    env:
      DEPLOY_HOST: test.jpwebcreation.nl
      DEPLOY_USER: jpwebcreation
      DEPLOY_PATH: /home/jpwebcreation/test.jpwebcreation.nl

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.JPWEB_DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Missing required secret: JPWEB_DEPLOY_SSH_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/jpweb_deploy_key
          chmod 600 ~/.ssh/jpweb_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='*.md' \
            -e "ssh -i ~/.ssh/jpweb_deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

  deploy_production:
    name: Deploy to production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://jpwebcreation.nl/

    permissions:
      contents: read

    env:
      DEPLOY_HOST: test.jpwebcreation.nl
      DEPLOY_USER: jpwebcreation
      DEPLOY_PATH: /home/jpwebcreation/public_html

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.JPWEB_DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Missing required secret: JPWEB_DEPLOY_SSH_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/jpweb_deploy_key
          chmod 600 ~/.ssh/jpweb_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='*.md' \
            -e "ssh -i ~/.ssh/jpweb_deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
