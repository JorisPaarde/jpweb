<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15392f"/>
      <stop offset="0.72" stop-color="#315f4f"/>
      <stop offset="1" stop-color="#5f765d"/>
    </linearGradient>
    <clipPath id="screen-clip">
      <rect x="650" y="62" width="620" height="470" rx="22"/>
    </clipPath>
    <filter id="screen-shadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#071a14" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#background)"/>
  <circle cx="1110" cy="70" r="230" fill="#e7ad52" opacity="0.13"/>
  <rect x="70" y="68" width="52" height="52" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="96" y="102" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">JP</text>
  <text x="140" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">JPWebcreation</text>
  <text x="70" y="224" fill="#e7ad52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">WEBSITES EN ONLINE TOOLS</text>
  <text x="70" y="298" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="53" font-weight="800">Die werk uit</text>
  <text x="70" y="359" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="53" font-weight="800">handen nemen.</text>
  <text x="70" y="423" fill="#ffffff" opacity="0.76" font-family="Inter, Arial, sans-serif" font-size="22">Praktisch gebouwd rond jouw proces.</text>
  <text x="70" y="548" fill="#ffffff" opacity="0.68" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">jpwebcreation.nl</text>
  <g filter="url(#screen-shadow)" transform="rotate(-3 890 315)">
    <rect x="650" y="62" width="620" height="470" rx="24" fill="#ffffff"/>
    <image x="650" y="62" width="620" height="470" preserveAspectRatio="xMidYMid slice" clip-path="url(#screen-clip)" xlink:href="../projects/haveka-flat.jpg"/>
    <rect x="650" y="62" width="620" height="470" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.42" stroke-width="3"/>
  </g>
</svg>
